name: Build Android APK

on:
  workflow_dispatch: # lets you run it manually from the Actions tab
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.6
      - run: flutter pub get
      - run: flutter build apk --release
      # Download from the workflow run (Actions tab → run → Artifacts)
      - uses: actions/upload-artifact@v4
        with:
          name: examprep-apk
          path: build/app/outputs/flutter-apk/app-release.apk
      # Also publish a permanent download link under Releases
      - name: Publish APK to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: ExamPrep — latest APK
          body: Install on Android (allow "install from unknown source" when prompted).
          files: build/app/outputs/flutter-apk/app-release.apk
